version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.0
    restart: always
    environment:
      POSTGRES_USER: global_user
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: global_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
